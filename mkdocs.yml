site_name: BetsWave
site_description: BetsWave Whitepaper - Decentralized Data Processing and Analytics Platform on Hedera
site_url: https://whitepaper.betswave.io/
repo_url: https://github.com/betswave/whitepaper
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  logo: assets/logo0.svg
  favicon: assets/favicon.ico

  palette:
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode

  features:
    - navigation.sections
    - navigation.top
    - navigation.footer
    - content.action.edit
    - toc.follow

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - footnotes

nav:
  - Home: index.md
  - 1. Introduction: 01-introduction.md
  - 2. Market Context: 02-market-context.md
  - 3. Technology Framework: 03-technology-framework.md
  - 4. Tokenomics — Wave Token (WAVE): 04-wave-token.md
  - 5. Revenue Architecture: 05-revenue-architecture.md
  - 6. Development Roadmap: 06-roadmap.md
  - 7. Platform Access and Compliance Policy: 07-platform-compliance.md
  - 8. Risk Factors: 08-risk-factors.md
  - 9. Conclusion: 09-conclusion.md
  - 10. General Disclaimer: 10-disclaimer.md
  - 11. References: 11-references.md

extra_css:
  - stylesheets/extra.css

extra:
  generator: false

copyright: "© Copyright 2026. BetsWave. All rights reserved."